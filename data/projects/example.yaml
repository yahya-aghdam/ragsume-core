project_name: "Ragsume Core"
category: backend
date_range: "2024-2025"
tech_stack:
  - go
  - qdrant
  - ollama
problem: >
  Recruiters need grounded answers about real project experience without
  reading long resumes. A generic chatbot would hallucinate details.
decisions: >
  Chose RAG over fine-tuning for freshness and citation. Split profile
  (always in system prompt) from project chunks (vector search). Used
  Ollama locally for embeddings to avoid embedding API costs.
tradeoffs: >
  Local Ollama adds ops complexity vs a hosted embed API, but keeps
  ingest cheap and vectors under our control.
outcome: >
  Shipped a streaming chat API with tool-grounded responses and
  metadata filters for tech stack and category.
